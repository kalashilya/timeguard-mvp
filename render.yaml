services:
  - type: web
    name: timeguard-planner
    runtime: static
    plan: free
    buildCommand: echo "Static HTML/CSS/JS site — no build step required"
    staticPublishPath: .
    headers:
      - path: /*
        name: X-Frame-Options
        value: sameorigin
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
    routes:
      - type: redirect
        source: /overview
        destination: /projects/timeguard/demo-center.html
      - type: redirect
        source: /about
        destination: /projects/timeguard/pitch.html
      - type: redirect
        source: /planner
        destination: /projects/timeguard/app.html
      - type: redirect
        source: /cabinet
        destination: /projects/timeguard/cabinet.html
      - type: redirect
        source: /cloud
        destination: /projects/timeguard/cloud.html
      - type: redirect
        source: /pricing
        destination: /projects/timeguard/pricing.html
      - type: redirect
        source: /login
        destination: /projects/timeguard/login.html
      - type: redirect
        source: /register
        destination: /projects/timeguard/register.html
      - type: redirect
        source: /signup
        destination: /projects/timeguard/register.html
