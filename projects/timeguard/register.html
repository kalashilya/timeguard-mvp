<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TimeGuard registration</title>
  <link rel="icon" href="../../favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="app.css?v=13">
</head>
<body>
  <header class="header"><div class="container header-inner"><a class="brand" href="../../index.html"><span class="logo">T</span><span>TimeGuard<br><small>регистрация</small></span></a><nav class="nav"><a href="demo-center.html?v=13">Обзор</a><a href="app.html?v=13">Планировщик</a><a href="login.html?v=13" data-auth-link>Войти</a><a href="cabinet.html?v=13" data-user-link class="hidden">Кабинет</a></nav></div></header>
  <main class="hero"><div class="container grid"><section class="card pad glow"><p class="eyebrow">Создать аккаунт</p><h1><span class="gradient-text">Регистрация</span> в TimeGuard</h1><p class="lead">Создайте профиль, чтобы перейти к планировщику, кабинету и облачной синхронизации задач.</p><div id="authStatus" class="alert">Проверка подключения...</div></section><section class="card pad"><form id="registerForm" class="stack"><label class="field"><span>Имя</span><input id="regName" required placeholder="Илья"></label><label class="field"><span>Email</span><input id="regEmail" required type="email" placeholder="name@example.com"></label><label class="field"><span>Пароль</span><input id="regPassword" type="password" minlength="6" placeholder="минимум 6 символов"></label><button class="btn btn-primary" type="submit">Создать аккаунт</button><a class="btn btn-secondary" href="login.html?v=13">Уже есть аккаунт? Войти</a></form></section></div></main>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="supabase-settings.js?v=10"></script>
  <script src="supabase-adapter.js?v=10"></script>
  <script src="auth-bootstrap.js?v=10"></script>
  <script src="nav-auth.js?v=12"></script>
  <script>
    authStatus.textContent = window.TimeGuardSupabase?.ready ? 'Облачная синхронизация подключена. Будет создан профиль.' : 'Облачная синхронизация временно недоступна. Работает локальный режим.';
    function clearLocalPlan() {
      localStorage.removeItem('timeguard_tasks_v1');
      localStorage.removeItem('timeguard_stats_v1');
      localStorage.removeItem('timeguard_selected_plan');
    }
    document.getElementById('registerForm').addEventListener('submit', async function(event) {
      event.preventDefault();
      const profile = { name: regName.value.trim(), email: regEmail.value.trim(), role: 'user', plan: 'free', createdAt: new Date().toISOString() };
      if (window.TimeGuardSupabase?.ready && regPassword.value) {
        const result = await TimeGuardSupabase.signUp(profile.email, regPassword.value, profile.name);
        if (result.error) { alert(result.error.message); return; }
        const userId = result.data.user?.id;
        if (userId) {
          await TimeGuardSupabase.upsertProfile({ id: userId, email: profile.email, full_name: profile.name, role: 'user', plan: 'free' });
        }
      }
      clearLocalPlan();
      TimeGuardAuth.saveProfile(profile);
      window.TimeGuardNav?.renderAuthNav?.();
      location.href = 'verify-step.html?v=13';
    });
  </script>
</body>
</html>
