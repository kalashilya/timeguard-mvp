<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TimeGuard кабинет</title>
  <link rel="stylesheet" href="app.css?v=10">
</head>
<body data-page="cabinet">
  <header class="header">
    <div class="container header-inner">
      <a class="brand" href="demo-center.html?v=10"><span class="logo">T</span><span>TimeGuard<br><small>кабинет</small></span></a>
      <nav class="nav"><a href="demo-center.html?v=10">Demo</a><a href="app.html?v=10">Планировщик</a><a href="cloud.html?v=10">Cloud</a><a href="login.html?v=10">Вход</a><a href="pricing.html?v=10">Тарифы</a><a href="admin.html?v=10">Admin</a></nav>
    </div>
  </header>
  <main class="hero">
    <div class="container">
      <section class="card pad">
        <p class="eyebrow">Личный кабинет</p>
        <h1>Сохранённые планы</h1>
        <p class="lead">Здесь отображаются профиль, текущий тариф и планы по датам.</p>
        <div class="cards">
          <article class="card small-card"><h3>Профиль</h3><p id="cabinetProfile"></p></article>
          <article class="card small-card"><h3>Тариф</h3><p class="price" id="cabinetPlan">FREE</p></article>
          <article class="card small-card"><h3>Хранение</h3><p>браузер + Supabase</p></article>
        </div>
        <div class="actions"><button class="btn btn-primary" id="syncSupabaseBtn">Синхронизировать с Supabase</button><a class="btn btn-secondary" href="cloud.html?v=10">Открыть Cloud-задачи</a><a class="btn btn-ghost" href="login.html?v=10">Войти через Supabase</a></div>
        <div id="syncResult" class="alert hidden"></div>
      </section>
      <section class="section">
        <div id="cabinetEmpty" class="empty hidden">Планов пока нет.</div>
        <div id="cabinetPlans" class="cards"></div>
      </section>
    </div>
  </main>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="supabase-settings.js?v=10"></script>
  <script src="supabase-adapter.js?v=10"></script>
  <script src="supabase-sync.js?v=10"></script>
  <script src="app.js?v=10"></script>
</body>
</html>
