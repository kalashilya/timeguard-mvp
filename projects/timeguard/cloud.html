<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TimeGuard cloud</title>
  <link rel="icon" href="../../favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="app.css?v=12">
</head>
<body data-page="cloud">
  <header class="header">
    <div class="container header-inner">
      <a class="brand" href="../../index.html"><span class="logo">T</span><span>TimeGuard<br><small>cloud</small></span></a>
      <nav class="nav"><a href="demo-center.html?v=12">Обзор</a><a href="pitch.html?v=12">О продукте</a><a href="app.html?v=12">Планировщик</a><a href="cabinet.html?v=12">Кабинет</a><a href="login.html?v=12">Войти</a><a class="btn btn-primary" href="register.html?v=12">Регистрация</a></nav>
    </div>
  </header>
  <main class="hero">
    <div class="container">
      <section class="card pad glow">
        <p class="eyebrow">Cloud storage</p>
        <h1><span class="gradient-text">Облачные</span> задачи</h1>
        <p class="lead">Здесь отображаются задачи, которые сохранены в облаке для текущего пользователя.</p>
        <div class="actions">
          <button class="btn btn-primary" id="loadCloudBtn">Загрузить из облака</button>
          <a class="btn btn-secondary" href="cabinet.html?v=12">Вернуться в кабинет</a>
          <a class="btn btn-ghost" href="login.html?v=12">Войти</a>
        </div>
        <div id="cloudStatus" class="alert hidden" style="margin-top:18px"></div>
      </section>
      <section class="section">
        <div class="kpi-grid">
          <article class="kpi"><strong>Аккаунт</strong><span id="cloudUser">—</span></article>
          <article class="kpi"><strong id="cloudTotal">0</strong><span>всего задач</span></article>
          <article class="kpi"><strong id="cloudDone">0</strong><span>выполнено</span></article>
          <article class="kpi"><strong>Доступ</strong><span>только свои данные</span></article>
        </div>
      </section>
      <section class="section">
        <div id="cloudEmpty" class="empty">Нажмите «Загрузить из облака».</div>
        <div id="cloudTasks" class="timeline"></div>
      </section>
    </div>
  </main>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="supabase-settings.js?v=10"></script>
  <script src="supabase-adapter.js?v=10"></script>
  <script src="nav-auth.js?v=12"></script>
  <script src="cloud-guide.js?v=1"></script>
  <script src="cloud-tasks.js?v=11"></script>
</body>
</html>
